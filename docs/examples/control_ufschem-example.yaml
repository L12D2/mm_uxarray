# General Description:
# - Any key that is specific for a plot type will begin with `ts` for timeseries, `ty` for taylor.
# - Some keys/groups are optional.
# - For now, all plots except time series average over the analysis window.
# - Setting axis values
#   - If set_axis = True in data_proc section of each plot_grp,
#     the yaxis for the plot will be set based on the values
#     specified in the obs section for each variable.
#   - If set_axis is set to False, then defaults will be used.
#   - 'vmin_plot' and 'vmax_plot' are needed for
#     'timeseries', 'spatial_overlay', and 'boxplot'.
#   - 'vdiff_plot' is needed for 'spatial_bias' plots
#   - 'ty_scale' is needed for 'taylor' plots.
#   - 'nlevels' or the number of levels used in the contour plot can also optionally be provided for spatial_overlay plot.
#   - If set_axis = True and the proper limits are not provided in the obs section,
#     a warning will print, and the plot will be created using the default limits.

analysis:
  start_time: "2017-07-01-00:00:00" # UTC
  end_time: "2017-07-03-00:00:00" # UTC
  output_dir: ./output/airnow_ufschem # relative to the program using this control file
  #   Currently, the directory must exist or plot saving will error and fail.
  debug: True

model:
  ufschem_v1: # model label
    files: example:ufschem:2017-07
    mod_type: "ufschem" #change
    mod_kwargs:
      surf_only: True  # specify that we have only one vertical level; WRF-Chem specific
    radius_of_influence: 100000 # meters

    extra_calc: # Add more complex calculations and their associated variables here.  

    ####### Extra_calc naming example
    # variable_calculating
      # variable required for calculation: "variable name in model"
      
      dewpoint:
        specific_hum: "spfh" # string of what it is in the model
      rel_hum: 
        specific_hum: "spfh"
        temp_calc: "temperature_k"
      windspeed:
        u_comp: "ugrd"  
        v_comp: "vgrd" 
      winddir: 
        u_comp: "ugrd" 
        v_comp: "vgrd" 
      wind_barb: 
        u_comp: "ugrd" 
        v_comp: "vgrd" 

    mapping: # of _model_ species name to _obs_ species name
      airnow: # specifically for the obs labeled 'airnow'
        o3: "OZONE"
        temperature_k: "TEMP"
        windspeed: "WS"
        winddir: "WD"
        rel_hum: "RHUM"

    #variables: 
     # winddir: None # provide this as a none, otherwise YAML will error. 
     # if you do not want plots specifically for wind direction, simply add it to the variable list here. 
     # Wind direction is needed if you wish to plot wind roses. 
     
    projection: ~
    plot_kwargs: # optional
      color: "magenta"
      marker: "s"
      linestyle: "-"

obs:
  airnow: # obs label
    use_airnow: True
    filename: example:airnow:2017-07
    obs_type: pt_sfc
    variables: # optional
      OZONE:
        unit_scale: 1
        # ^ optional; Scaling factor
        unit_scale_method: "*"
        # ^ optional; Multiply = '*' , Add = '+', subtract = '-', divide = '/'
        nan_value: -1.0
        # ^ optional; When loading data, set this value to NaN
        ylabel_plot: "Ozone (ppbv)"
        # optional; set ylabel in order to include units and/or other info
        xlabel_plot: "Ozone (ppbv)"
        # optional; set ylabel in order to include units and/or other info
        vmin_plot: 15.0
        # ^ optional; Min for y-axis during plotting.
        #   To apply to a plot, change restrict_yaxis = True.
        vmax_plot: 100
        # ^ optional; Max for y-axis during plotting.
        #   To apply to a plot, change restrict_yaxis = True.
        vdiff_plot: 20.0
        # ^ optional; +/- range to use in bias plots.
        #   To apply to a plot, change restrict_yaxis = True.
        nlevels_plot: 21
        # ^ optional; number of levels used in colorbar for contourf plot.
      TEMP:
        unit_scale: 273.15
        unit_scale_method: "+"
        nan_value: -1.0
        ylabel_plot: "Temperature (K)"
        xlabel_plot: "Temperature (K)"
        vmin_plot: 275
        vmax_plot: 320
        vdiff_plot: 20.0
        nlevels_plot: 21
      WS:
        unit_scale: 1
        unit_scale_method: "*"
        nan_value: -1.0
        ylabel_plot: "Windspeed (m/s)"
        xlabel_plot: "Windspeed (m/s)"
        vmin_plot: 0
        vmax_plot: 10
        vdiff_plot: 4
        nlevels_plot: 18
      WD:
        unit_scale: 1
        unit_scale_method: "*"
        nan_value: -1.0
        ylabel_plot: "Wind Direction (deg)"
        xlabel_plot: "Wind Direction (deg)"
        vmin_plot: 0
        vmax_plot: 380
        vdiff_plot: 3
        nlevels_plot: 18
      RHUM:
        unit_scale: 1
        unit_scale_method: "*"
        nan_value: -1.0
        ylabel_plot: "Relative Humidity (%)"
        xlabel_plot: "Relative Humidity (%)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 15
        nlevels_plot: 8
        
plots:
  plot_grp1:
    type: "timeseries" # plot type
    fig_kwargs: # optional; to define figure options
      figsize: [12, 6] # figure size (width, height) in inches
    default_plot_kwargs:
      # ^ optional; Define defaults for all plots.
      #   Important: Model kwargs overwrite these.
      linewidth: 2.0
      markersize: 10.
    text_kwargs: # optional
      fontsize: 24.
    domain_type: ["all", "state_name", "epa_region"]
    # ^ List of domain types: 'all' or any domain in obs file.
    #   (e.g., airnow: epa_region, state_name, siteid, etc.)
    domain_name: ["ALL", "CA", "R9"]
    # ^ List of domain names. If domain_type = all,
    #   the domain name is used in the plot title.
    data: ["airnow_ufschem_v1"]
    # ^ make this a list of pairs in obs_model
    #   where the obs is the obs label and model is the model_label
    data_proc: # optional
      rem_obs_nan: True
      # ^ True: Remove all points where model or obs variable is NaN.
      #   False: Remove only points where model variable is NaN.
      ts_select_time: "time_local"  # `ts_` indicates this is time series plot-specific
      # ^ Time used for avg and plotting
      #   Options: 'time' for UTC or 'time_local'
      ts_avg_window: "h"
      # ^ Options: None for no averaging, pandas resample rule (e.g., 'h', 'D')
      set_axis: True
      # ^ If true, add `vmin_plot` and `vmax_plot` for each variable in obs.

  plot_grp2:
    type: "spatial_bias"
    fig_kwargs: # optional; For all spatial plots, specify map_kwargs here too.
      states: True  # such as whether to show the state boundaries
      figsize: [10, 5]
    text_kwargs:
      fontsize: 16.
    domain_type: ["state_name"]
    domain_name: ["CA"]
    data: ["airnow_ufschem_v1"]
    data_proc:
      rem_obs_nan: True
      set_axis: True

  plot_grp3:
    type: "spatial_overlay"
    fig_kwargs:
      states: True
      figsize: [10, 5]
    text_kwargs:
      fontsize: 16.
    domain_type: ["epa_region"]
    domain_name: ["R9"]
    data: ["airnow_ufschem_v1"]
    data_proc:
      rem_obs_nan: True
      set_axis: True
      
  plot_grp4:
    type: "boxplot"
    fig_kwargs:
      figsize: [8, 6]
    text_kwargs:
      fontsize: 20.
    #gridlines: True
    domain_type: ["all", "epa_region"]
    domain_name: ["ALL", "R9"]
    data: ["airnow_ufschem_v1"]
    data_proc:
      rem_obs_nan: True
      set_axis: False
      set_stat_sig: False

  plot_grp5:
    type: "multi_boxplot"
    fig_kwargs:
      figsize: [10, 8]
    text_kwargs:
      fontsize: 20.
    gridlines: True
    xlabel: "Binned by Observed Wind Speed (m/s)"
    domain_type: ["all"]
    domain_name: ["ALL"]
    # to create an interval boxplot, simply specify the intervals you would like to plot AND the variable name. In this case, wind speed is being plotted at several intervals. 
    interval_list: [0, 3, 5, 8, 11, 14] 
    interval_var: WS
    interval_labels: ["[0, 3)", "[3, 5)", "[5, 8)", "[8, 11)", "[11, 14)"] 
    model_name_list: ['AirNow', "ufschem_v1"]
    data: ["airnow_ufschem_v1"]
    data_proc:
      rem_obs_nan: True
      set_axis: False

  plot_grp6:
    type: "rose_plot"
    text_kwargs:
      fontsize: 16.
    domain_type: ["all", "state_name"] 
    domain_name: ["ALL", "CA"] 
    data: ["airnow_ufschem_v1"]
    color_map: "inferno"  
    
  # Default Colormap for the density plot can be used. Options include:
  #                       # 'viridis', 'plasma', 'inferno', 'magma', 'cividis',
  #                       # 'jet', 'hot', 'cool', 'spring', 'summer', 'autumn', 'winter',
  #                       # 'RdBu_r', 'seismic', 'coolwarm',
  #                       # 'Blues', 'BuGn', 'YlOrRd', 'Greys'
  # If you use an unsupported colormap, you will get an error listing the supported colormaps.
  
    data_proc:
      rem_obs_nan: True
      set_axis: True
  
  plot_grp7:
    type: "diurnal"
    fig_kwargs:
      figsize: [12, 6] 
    default_plot_kwargs:
      linewidth: 2.0
      markersize: 10.
    text_kwargs: 
      fontsize: 24.
    domain_type: ["all", "state_name", "epa_region"]
    domain_name: ["ALL", "CA", "R9"]
    data: ["airnow_ufschem_v1"]
    data_proc: 
      rem_obs_nan: True
      ts_select_time: "time_local" 
      ts_avg_window: "h"
      set_axis: True 
      
stats:
  # Stats require positive numbers, so if you want to calculate temperature use Kelvin!
  # Wind direction has special calculations for AirNow if obs name is 'WD'
  stat_list: ["MB", "MdnB", "R2", "RMSE", "MAE", "MSE"]
  # ^ List stats to calculate. Dictionary of definitions included
  #   in submodule `plots/proc_stats`. Only stats listed below are currently working.
  #   Full calc list:
  #   ['STDO', 'STDP', 'MdnNB','MdnNE','NMdnGE', "MAE", "MSE", "MAPE", "SMAPE"
  #    'NO', 'NOP', 'NP', 'MO', 'MP', 'MdnO', 'MdnP',
  #    'RM', 'RMdn', 'MB', 'MdnB', 'NMB', 'NMdnB', 'FB',
  #    'ME','MdnE','NME', 'NMdnE', 'FE', 'R2', 'RMSE','d1',
  #    'E1', 'IOA', 'AC']
  round_output: 2 # optional; defaults to rounding to 3rd decimal place
  output_table: True
  # ^ Always outputs a .txt file.
  #   Optional to also output a Matplotlib figure table (image).
  output_table_kwargs: # optional
    figsize: [7, 3]
    fontsize: 12.
    xscale: 1.4
    yscale: 1.4
    edges: "horizontal"
  domain_type: ["all"]
  domain_name: ["ALL"]
  data: ["airnow_ufschem_v1"]
