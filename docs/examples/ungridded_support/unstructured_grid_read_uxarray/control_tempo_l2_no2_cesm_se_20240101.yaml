# General Description:  
# Any key that is specific for a plot type will begin with ts for timeseries, ty for taylor
# Opt: Specifying the variable or variable group is optional
# For now all plots except time series average over the analysis window. 
# Setting axis values - If set_axis = True in data_proc section of each plot_grp the yaxis for the plot will be set based on the values specified in the obs section for each variable. If set_axis is set to False, then defaults will be used. 'vmin_plot' and 'vmax_plot' are needed for 'timeseries', 'spatial_overlay', and 'boxplot'. 'vdiff_plot' is needed for 'spatial_bias' plots and'ty_scale' is needed for 'taylor' plots. 'nlevels' or the number of levels used in the contour plot can also optionally be provided for spatial_overlay plot. If set_axis = True and the proper limits are not provided in the obs section, a warning will print, and the plot will be created using the default limits.

#-------------------------------------------------------------------
# Universal comparison variables
analysis:
  start_time: '2024-01-01'          #UTC
  end_time: '2024-01-02'          #UTC
  output_dir: 
    /glade/u/home/lcthompson/mm/MELODIES-MONET/docs/examples/ungridded_support/unstructured_grid_read_uxarray/output/tempo_camchemse
  output_dir_save: 
    /glade/u/home/lcthompson/mm/MELODIES-MONET/docs/examples/ungridded_support/unstructured_grid_read_uxarray/output/tempo_camchemse
  output_dir_read: 
    /glade/u/home/lcthompson/mm/MELODIES-MONET/docs/examples/ungridded_support/unstructured_grid_read_uxarray/output/tempo_camchemse

  save:
    paired:
      method: 'netcdf'
      prefix: '20240101'
      data: all
  read:
    paired:
      method: 'netcdf'
      filenames: {tempo_l2_no2_cesm_se: ['tempo_l2_no2_cesm_se']}
  debug: false

obs:
  tempo_l2_no2:
    debug: false
    filename: 
      #/glade/campaign/acom/acom-da/sma/TEMPO_NO2_V03/TEMPO_NO2_L2_V03_20240102*_S*
      # peizhi
      #/glade/campaign/acom/acom-da/sma/TEMPO_NO2_V01/L2/TEMPO_NO2_L2_V01_20240101T*.nc
      # jerrold
      # /glade/derecho/scratch/jjacdan/TEMPO/TEMPO_NO2_L2_V03_2024010[1]T*.nc
      /glade/derecho/scratch/jjacdan/TEMPO/TEMPO_NO2_L2_V03_20240101T125157Z_S001G01.nc
      #- /glade/derecho/scratch/jjacdan/TEMPO/TEMPO_NO2_L2_V03_20240101T125837Z_S001G02.nc
      #- /glade/derecho/scratch/jjacdan/TEMPO/TEMPO_NO2_L2_V03_20240101T130514Z_S001G03.nc
      
    obs_type: sat_swath_clm
    sat_type: tempo_l2_no2
    variables:
      main_data_quality_flag:
        main_data_quality_flag_max: 0
        var_applied: ['vertical_column_troposphere']
      vertical_column_troposphere:
        ylabel_plot: 'NO2 trop. column'
      pressure: {}
      tropopause_pressure: {}
      scattering_weights: {}
      amf_troposphere: {}

model:
  cam-chem-se:
    files:
      - /glade/campaign/acom/acom-da/conus_outputs/f.e22.FCnudged.ne0CONUSne30x8_ne0CONUSne30x8_mt12.ERA5_ref_dust_M1.1.002/H1/f.e22.FCnudged.ne0CONUSne30x8_ne0CONUSne30x8_mt12.ERA5_ref_dust_M1.1.002.cam.h1.2024-01-01-03600.nc
 
    mod_type: 'cesm_se'
    scrip_file: "/glade/campaign/acom/MUSICA/grids/ne0CONUSne30x8/ne0CONUS_ne30x8_np4_SCRIP.nc"
    # mod_kwargs:
    #   surf_only: false
    mapping:
      tempo_l2_no2:
        NO2: "vertical_column_troposphere"
    projection: ~
    surf_only: false

plots:
  plot_grp1:
    type: 'timeseries'
    fig_kwargs:
      figsize: [12, 6]
    default_plot_kwargs:
      linewidth: 2.0
      markersize: 10.
    text_kwargs:
      fontsize: 18.
    domain_type: ["all"] #, "auto-region:giorgi", "auto-region:custom"]
    domain_name: ["CONUS"] #, "CNA", "custom"]
    # domain_box: [37, -108, 40, -102]
    data: ["tempo_l2_no2_cesm_se"]
    data_proc:
      ts_offset: (-4, 'h')
      ts_avg_window: 'h'
      set_axis: true

  plot_grp2:
    type: 'gridded_spatial_bias'
    fig_kwargs:
      states: true
      counties: true
    text_kwargs:
      fontsize: 16
    domain_type: ['all', 'all']
    domain_name: ['CONUS', 'model']
    data: ['tempo_l2_no2_cesm_se']
    data_proc:
      set_axis: true

  plot_grp3:
    type: 'spatial_dist'
    fig_kwargs:
      states: true
      counties: false
    text_kwargs:
      fontsize: 16
    domain_type: ['all', 'all']
    domain_name: ['CONUS', 'model']
    data: ['tempo_l2_no2_cesm_se']
    data_proc:
      set_axis: true
      vmax: 1e16
      vmin: 0

  plot_grp4:
    type: 'taylor'
    data: ['tempo_l2_no2_cesm_se']
    domain_type: ['all']
    domain_name: ['CONUS']
    data_proc:
      set_axis: true
      ty_scale: 1.5
    default_plot_kwargs:
      markersize: 10.
      marker: 's'
