stats:
  #Stats require positive numbers, so if you want to calculate temperature use Kelvin!
  #Wind direction has special calculations for AirNow if obs name is 'WD'
  stat_list: ['MB', 'ME', 'RMSE', 'NMB', 'NME', 'R2'] #List stat to calculate below. Dictionary of definitions included in plots/proc_stats.py
  #Full calc list ['STDO', 'STDP', 'MNB', 'MNE', 'MdnNB', 'MdnNE', 'NMdnGE','NO','NOP','NP','MO','MP', 'MdnO', 'MdnP', 'RM', 'RMdn', 'MB', 'MdnB', 'NMB', 'NMdnB', 'FB', 'ME', 'MdnE', 'NME', 'NMdnE', 'FE', 'MNPB', 'MdnNPB', 'MNPE', 'MdnNPE', 'NMPB', 'NMdnPB', 'NMPE', 'NMdnPE', 'R2', 'RMSE', 'd1', 'E1', 'IOA', 'AC', 'HSS', 'ETS'] 
  output_table: true #Always outputs a .txt file. Optional to also output as a table.
  domain_type: ['all'] #List of domain types: 'all' or any domain in obs file. (e.g., airnow: epa_region, state_name, siteid, etc.) 
  domain_name: ['CONUS'] #List of domain names. If domain_type = all domain_name is used in plot title.
  data: ['airnow_cam-chem-se'] # make this a list of pairs in obs_model where the obs is the obs label and model is the model_label



